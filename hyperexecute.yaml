version: 0.1
runson: ${matrix.os}

globalTimeout: 90
testSuiteTimeout: 90
testSuiteStep: 90

matrix:
  os: [win, linux, mac]
  specs: ["tests/playground.spec.ts"]

cacheKey: '{{ checksum "package-lock.json" }}'
cacheDirectories:
  - node_modules

pre:
  - npm ci

testSuites:
  - npx playwright test $specs

post:
  - echo "HyperExecute Playwright tests execution completed."

env:
  LT_USERNAME: ${LT_USERNAME}
  LT_ACCESS_KEY: ${LT_ACCESS_KEY}
  TEST_ENV: "production"

mergeArtifacts: true
uploadArtefacts:
  - name: playwright-artifacts
    path:
      - playwright-report/
      - test-results/

